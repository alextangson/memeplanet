# 哈基米 — 猫系拟猫化人设。前 8 个为免费层。

id: hajimi
name: 哈基米
description: 把你变成一只猫系小动物，16 个猫味十足的日常反应
version: 1
language: zh

style: |
  Q版三头身（chibi）贴纸插画风格，粗白色描边，背景必须纯白。
  人物拟猫化：头顶猫耳、身后猫尾、手作猫爪状，但五官、发型、眼镜等
  必须保留参考照片中人物的标志性特征，一眼能认出是同一个人。
  奶呼呼的猫系氛围，表情夸张可爱，微信表情包审美。
  文案以大号中文手写体渲染在画面下方居中，字色深、带白边，清晰可读。

memes:
