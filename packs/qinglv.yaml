# 情侣日常 — 上传你俩的合照。互怼和发糖各占一半，谁发都合适。

id: qinglv
name: 情侣日常
description: 上传你俩的合照——互怼一半、发糖一半的 16 个同框瞬间
version: 1
language: zh
subject: group

style: |
  Q版三头身（chibi）贴纸插画风格，粗白色描边，背景必须纯白。
  两人必须都与参考照片一致并贯穿全套：各自的发型、脸型、眼镜/配饰、
  服装、相对身高，一眼能认出是这两个人。
  两人的互动是画面核心，肢体语言生动，表情夸张。
  文案以大号中文手写体渲染在画面下方居中，字色深、带白边，清晰可读。

