name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Sync dependencies
        run: uv sync --extra web
      - name: Run tests
        run: uv run pytest -q
      - name: Validate all packs
        run: |
          for p in packs/*.yaml; do
            uv run meme-me validate "$p"
          done
